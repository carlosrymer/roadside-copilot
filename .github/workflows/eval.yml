name: Agent eval (regression gate)

on:
  push:
    branches: [main]
    paths:
      - 'evals/**'
      - 'infra/lambda/**'
      - 'data/**'
      - '.github/workflows/eval.yml'
  pull_request:
    paths:
      - 'evals/**'
      - 'infra/lambda/**'
      - 'data/**'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: evals/package-lock.json
      - run: npm ci
      - name: Run regression gate against the deployed agent
        env:
          # Points the evaluator at the live API; keys stay server-side in Lambda.
          EVAL_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run eval:regression
